 <body>
  <div id="root"></div>
  <script>
    (function() {
    if (!/\/m\/doc/.test(location.pathname)) {
      return
    }
    var docIdMatch = location.pathname.match(/\/m\/doc\/([^/?#]+)/)
    var docId = docIdMatch ? docIdMatch[1] : null
    if (!docId) {
      return
    }
    // 检查是否命中缓存屏灰度（从 localStorage 读取已经判断好的结果）
    function isSplashCacheGrayEnabled() {
      try {
        return localStorage.getItem('doc_splash_cache_gray_enabled') === 'true'
      } catch (e) {
        return false
      }
    }
    // 检查灰度是否命中
    if (!isSplashCacheGrayEnabled()) {
      return
    }
    function initDB() {
      return new Promise(function(resolve, reject) {
        var request = indexedDB.open('doc-splash-db')
        request.onerror = function() {
          reject(request.error)
        }

        request.onsuccess = function() {
          resolve(request.result)
        }
        request.onupgradeneeded = function(event) {
          var db = event.target.result
          if (!db.objectStoreNames.contains('doc-splash-db-html')) {
            db.createObjectStore('doc-splash-db-html')
          }
        }
      })
    }
    var CACHE_VERSION = 1
    function getCachedDOM(docId) {
      return initDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var transaction = db.transaction(['doc-splash-db-html'], 'readonly')
          var store = transaction.objectStore('doc-splash-db-html')
          var request = store.get(docId)
          request.onsuccess = function() {
            var result = request.result
            if (result && result.htmlStr && result.version === CACHE_VERSION) {
              resolve(result.htmlStr)
            } else {
              resolve(null)
            }
          }

          request.onerror = function() {
            reject(request.error)
          }
        })
      }).catch(function(error) {
        return null
      })
    }
    var cachedHTML = null
    var htmlReady = false

    getCachedDOM(docId).then(function(html) {
      cachedHTML = html
      htmlReady = true
      if (html) {
        tryRender()
      }
    })
    function tryRender() {
      if (!htmlReady || !cachedHTML) {
        return
      }
      if (!document.body) {
        setTimeout(tryRender, 10)
        return
      }
      // 检查 #editorContainer 是否已经存在，如果存在则不处理
      if (document.getElementById('editorContainer')) {
        return
      }
      var tempContainer = document.createElement('div')
      tempContainer.innerHTML = cachedHTML

      var cachedRoot = tempContainer.firstElementChild
      if (cachedRoot) {
        cachedRoot.id = 'root-splash'
        cachedRoot.style.position = 'fixed'
        cachedRoot.style.top = '0'
        cachedRoot.style.left = '0'
        cachedRoot.style.width = '100%'
        cachedRoot.style.height = '100%'
        cachedRoot.style.minHeight = '100vh'
        cachedRoot.style.zIndex = '1'
        cachedRoot.style.background = '#fff'
        cachedRoot.style.overflow = 'auto'
        var toast = document.createElement('div')
        toast.id = 'doc-splash-toast'
        toast.textContent = '努力加载中...'
        toast.style.cssText = [
          'position:fixed',
          'bottom:40px',
          'left:50%',
          'transform:translateX(-50%)',
          'padding:0 16px',
          'display:none',
          'align-items:center',
          'justify-content:center',
          'height:40px',
          'background:#3D3D3D',
          'color:#fff',
          'font-size:14px',
          'border-radius:20px',
          'z-index:9999',
          'pointer-events:none',
          'white-space:nowrap'
        ].join(';')
        var scrollEl = cachedRoot.querySelector('#root-splash > #_mobile_app_content')
        cachedRoot.appendChild(toast)
        function onSplashScroll() {
          var el = scrollEl
          var atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 2
          console.log(el.scrollTop, el.clientHeight, el.scrollHeight, '=====');
          if (atBottom) {
            toast.style.display = 'flex'
            cachedRoot.removeEventListener('scroll', onSplashScroll)
          }
        }
        cachedRoot.addEventListener('dblclick', function() {
          toast.style.display = 'flex'
        })
        setTimeout(()=>{
          scrollEl.addEventListener('scroll', onSplashScroll)
        }, 100)
        document.body.appendChild(cachedRoot)
        var renderTime = performance.now()
        window.__DOC_SPLASH_RENDER_TIME__ = renderTime
      }
    }

    tryRender()
  })()
  </script>
